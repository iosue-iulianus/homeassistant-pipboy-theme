# Pip-Boy Terminal Theme for Home Assistant
# Derived from Nezz/homeassistant-visionos-theme (liquid_glass.yaml)
# Aesthetic: Fallout Pip-Boy 3000 / Vault-Tec CRT terminal
# Primary color: Phosphor green #12FF15 on near-black #0C0C0C
# Secondary accent: Hazard orange #FF6A00 (errors/warnings only)
# Requires: card-mod (HACS)

Pip-Boy:
  modes:
    light:
      background-image: "none"
      primary-background-color: "#111111"
      secondary-background-color: "#111111"
      app-header-background-color: rgba(0, 10, 0, 0.85)
      ha-card-background: rgba(0, 25, 0, 0.65)
      app-theme-color: "#000000"
      primary-text-color: rgba(18, 255, 21, 0.80)
    dark:
      background-image: "none"
      primary-background-color: "#0C0C0C"
      secondary-background-color: "#0C0C0C"
      app-header-background-color: rgba(0, 10, 0, 0.85)
      ha-card-background: rgba(0, 18, 0, 0.75)
      app-theme-color: "#000000"
  # Global
  lovelace-background: var(--background-image)
  light-primary-color: "#12FF15" # Icons on sidebar
  divider-color: rgba(0, 95, 0, 0.4) # phosphor dim border
  accent-color: var(--primary-color)
  # Text
  primary-text-color: rgba(18, 255, 21, 0.96)
  secondary-text-color: rgba(0, 142, 0, 0.96)
  text-primary-color: var(--primary-text-color)
  disabled-text-color: rgba(0, 95, 0, 0.5) # XXX: https://github.com/basnijholt/lovelace-ios-dark-mode-theme/issues/2
  text-dark-color: var(--primary-text-color)
  # Sidebar Menu
  sidebar-background-color: var(--secondary-background-color)
  sidebar-icon-color: var(--light-primary-color)
  sidebar-text-color: var(--light-primary-color)
  sidebar-selected-background-color: var(--primary-background-color)
  sidebar-selected-icon-color: var(--primary-text-color)
  sidebar-selected-text-color: var(--sidebar-selected-icon-color)
  # States and Badges
  state-icon-color: var(--primary-text-color)
  state-icon-active-color: var(--yellow-color)
  state-icon-unavailable-color: var(--disabled-text-color)
  state-inactive-color: var(--disabled-text-color)
  paper-item-icon-active-color: var(--state-icon-active-color) # see https://github.com/basnijholt/lovelace-ios-dark-mode-theme/issues/30
  # Sliders
  paper-slider-knob-color: "#12FF15"
  paper-slider-knob-start-color: var(--paper-slider-knob-color)
  paper-slider-pin-color: var(--paper-slider-knob-color)
  paper-slider-active-color: "#12FF15"
  paper-slider-secondary-color: var(--paper-slider-knob-color)
  paper-slider-container-color: rgba(18, 255, 21, 0.2)
  paper-slider-font-color: "#0C0C0C"
  ha-slider-background: none !important
  # Labels
  label-badge-background-color: "#001200"
  label-badge-text-color: "#12FF15"
  label-badge-red: rgba(255, 106, 0, 0.7) # hazard orange
  # Cards
  card-background-color: var(--secondary-background-color) # Data table background
  paper-listbox-background-color: var(--primary-background-color)
  ha-card-border-radius: 2px
  ha-card-features-border-radius: 2px
  paper-card-background-color: var(--ha-card-background)
  rgb-card-background-color: rgb(10, 10, 10) # see https://github.com/basnijholt/lovelace-ios-themes/issues/60
  ha-card-border-width: 0 # https://github.com/basnijholt/lovelace-ios-dark-mode-theme/issues/82#event-7732695357
  ha-card-backdrop-filter: blur(8px)
  ha-card-box-shadow: >
    0 0 0 1px rgba(18, 255, 21, 0.20),
    0 0 8px 0 rgba(18, 255, 21, 0.08) inset,
    0 0 2px 0 rgba(0, 0, 0, 0.80)
  # Toggles
  paper-toggle-button-checked-button-color: "#12FF15"
  paper-toggle-button-checked-bar-color: "#005F00"
  paper-toggle-button-unchecked-button-color: var(--paper-toggle-button-checked-button-color)
  paper-toggle-button-unchecked-bar-color: var(--disabled-text-color)
  # Table row
  table-row-background-color: var(--primary-background-color)
  table-row-alternative-background-color: var(--secondary-background-color)
  # Switches
  switch-checked-track-color: var(--green-color)
  switch-checked-button-color: "#12FF15"
  switch-unchecked-track-color: var(--disabled-text-color)
  switch-unchecked-button-color: "#005F00"
  # Dialog
  ha-dialog-surface-backdrop-filter: var(--ha-card-backdrop-filter)
  dialog-box-shadow: var(--ha-card-box-shadow)
  ha-dialog-surface-background: var(--ha-card-background)
  ha-dialog-scrim-backdrop-filter: none
  # Header
  app-header-backdrop-filter: var(--ha-card-backdrop-filter)
  app-header-edit-background-color: rgba(0, 0, 0, 0.2)
  # Colors
  red-color: "#BB313D"
  pink-color: "#BB313D"
  purple-color: "#005F00"
  indigo-color: "#005F00"
  blue-color: "#12FF15"
  light-blue-color: "#28FF2B"
  cyan-color: "#28FF2B"
  teal-color: "#008E00"
  green-color: "#12FF15"
  yellow-color: "#FFB641"
  orange-color: "#FF6A00"
  brown-color: "#664400"
  primary-color: var(--green-color)
  ha-color-primary-05: "#001200"
  ha-color-primary-10: "#002400"
  ha-color-primary-20: "#004800"
  ha-color-primary-30: "#006C00"
  ha-color-primary-40: "#12FF15"
  ha-color-primary-50: "#28FF2B"
  ha-color-primary-60: "#3EFF41"
  ha-color-primary-70: "#70FF73"
  ha-color-primary-80: "#9EFFA0"
  ha-color-primary-90: "#CCFFCD"
  ha-color-primary-95: "#E5FFE6"
  # Other
  paper-dialog-background-color: rgba(0, 15, 0, 0.92) # e.g., background of more-info
  paper-item-icon-color: "#12FF15" # also should mini-media-player icon (but doesn't work by itself)
  more-info-header-background: rgba(0, 10, 0, 0.85)
  lumo-body-text-color: var(--primary-text-color) # see https://github.com/basnijholt/lovelace-ios-dark-mode-theme/issues/42
  markdown-code-background-color: "#001200"
  code-editor-background-color: "#000A00"
  clear-background-color: var(--ha-card-background) # see https://github.com/basnijholt/lovelace-ios-themes/issues/64
  mdc-theme-surface: var(--secondary-background-color) # this should be opaque as it's used by default for many overlays
  material-background-color: var(--secondary-background-color)
  mdc-checkbox-unchecked-color: "#005F00"
  mdc-radio-unchecked-color: "#005F00"
  # Typography -- override MDC/Paper font stacks so Roboto is replaced globally
  mdc-typography-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-body1-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-body2-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-subtitle1-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-subtitle2-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-headline6-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-button-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-caption-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  mdc-typography-overline-font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  paper-font-common-base_-_font-family: '"Share Tech Mono", "Courier New", "VT323", monospace'
  # Custom
  mcg-title-letter-spacing: .15em
  mini-media-player-base-color: "#12FF15"
  mini-media-player-icon-color: "#12FF15"
  # Added for https://github.com/basnijholt/lovelace-ios-dark-mode-theme/issues/72
  input-ink-color: var(--primary-text-color)
  input-fill-color: transparent
  input-disabled-fill-color: transparent
  input-label-ink-color: var(--primary-text-color)
  input-disabled-ink-color: var(--disabled-text-color)
  input-dropdown-icon-color: var(--primary-text-color)
  input-idle-line-color: var(--secondary-text-color)
  input-hover-line-color: var(--secondary-text-color)
  codemirror-property: var(--accent-color)
  md-list-container-color: none # ha-md-list already has a card background
  # Dropdown
  wa-border-style: none
  wa-shadow-m: var(--ha-card-box-shadow)
  wa-border-radius-s: 2px
  wa-border-radius-m: 2px
  ha-color-on-neutral-normal: var(--primary-text-color) # icon color
  wa-color-neutral-fill-normal: "rgba(18, 255, 21, 0.08)" # hover color

  card-mod-theme: "Pip-Boy"
  card-mod-root: |
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
    :host {
      font-family: "Share Tech Mono", "Courier New", "VT323", monospace !important;
      letter-spacing: 0.05em;
    }
    * {
      font-family: "Share Tech Mono", "Courier New", "VT323", monospace !important;
      letter-spacing: 0.05em;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 60%,
        rgba(0, 0, 0, 0.40) 100%);
      pointer-events: none;
      z-index: 9999;
    }
  card-mod-drawer: |
    .mdc-drawer {
      background-color: rgba(0, 10, 0, 0.92) !important;
      backdrop-filter: var(--ha-card-backdrop-filter);
      background-image: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.08) 0px,
        rgba(0, 0, 0, 0.08) 1px,
        transparent 1px,
        transparent 2px
      ) !important;
    }
  card-mod-sidebar: |
    :host {
      background: none !important;
    }

    ha-md-list-item,
    ha-md-list-item.selected::before {
      border-radius: 2px !important;
    }
  card-mod-card-yaml: |
    .: |
      ha-card {
        backdrop-filter: unset !important;
      }
      ha-card::before {
        content: '';
        position: absolute;
        inset: 0;
        backdrop-filter: var(--ha-card-backdrop-filter);
        z-index: -1;
        pointer-events: none;
        border-radius: inherit;
        box-shadow: var(--ha-card-box-shadow);
      }
      :host(hui-heading-card) ha-card {
        background: none !important;
        backdrop-filter: none !important;
        border: none !important;
        border-top: 1px solid rgba(18, 255, 21, 0.60) !important;
        border-right: 1px solid rgba(18, 255, 21, 0.35) !important;
        padding-top: 24px !important;
        padding-right: 8px !important;
      }
      :host(hui-heading-card) ha-card::before {
        content: none !important;
      }
      :host(hui-heading-card) ha-card::after {
        content: none !important;
      }

      /* Phosphor text glow on heading labels */
      :host(hui-heading-card) {
        text-shadow: 0 0 8px rgba(18, 255, 21, 0.60),
                     0 0 2px rgba(18, 255, 21, 0.80) !important;
      }

      /* Energy dashboard */
      .mdc-data-table,
      .mdc-data-table__row,
      .mdc-data-table__header-cell,
      ha-sankey-chart {
        background: none !important;
      }

      /* Markdown card with text_only */
      ha-card.text-only {
        background: none !important;
        backdrop-filter: none !important;
        overflow: visible;
      }
      ha-card.text-only::before {
        content: none !important;
      }

      /* Mushroom title card */
      :host(mushroom-title-card) ha-card {
        background: none !important;
        backdrop-filter: none !important;
      }
      :host(mushroom-title-card) ha-card::before {
        content: none !important;
      }

      /* Mushroom chips card */
      :host(mushroom-chips-card) ha-card {
        background: none !important;
        backdrop-filter: none !important;
        box-shadow: none !important;
      }
      :host(mushroom-chips-card) ha-card::before {
        content: none !important;
        background: none !important;
        backdrop-filter: none !important;
      }

      /* Pip-Boy scanline overlay */
      ha-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.18) 0px,
          rgba(0, 0, 0, 0.18) 1px,
          transparent 1px,
          transparent 2px
        );
        z-index: 0;
        pointer-events: none;
        border-radius: inherit;
      }

      /* Phosphor border on cards */
      ha-card {
        border: 1px solid rgba(18, 255, 21, 0.18) !important;
      }

    hui-card-features $:
      hui-card-feature $:
        hui-target-humidity-card-feature $:
          ha-control-slider$: |
            .slider .slider-track-bar {
              border-radius: 0px !important;
            }
        service-call $:
          custom-feature-slider $: |
            .default .thumb {
              border-radius: 0px !important;
            }
        hui-cover-position-card-feature $:
          ha-control-slider$: |
            .slider .slider-track-bar {
              border-radius: 0px !important;
            }
        hui-cover-tilt-position-card-feature $:
          ha-control-slider$: |
            .slider .slider-track-bar {
              border-radius: 0px !important;
            }
        hui-light-brightness-card-feature $:
          ha-control-slider$: |
            .slider .slider-track-bar {
              border-radius: 0px !important;
            }

